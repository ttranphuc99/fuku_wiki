<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuku's Knowledge Base</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-4xl mx-auto">
        <header class="mb-12">
            <h1 class="text-4xl font-bold text-slate-800 mb-2">Fuku Wiki</h1>
            <p class="text-slate-500">Visualized technical insights and documentation.</p>
        </header>

        <div class="relative mb-8">
            <input type="text" id="searchBar" placeholder="Search topics (e.g., 'SQL', 'Architecture')..." 
                class="w-full p-4 pl-12 rounded-xl border border-slate-200 shadow-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            <svg class="w-6 h-6 absolute left-4 top-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
        </div>

        <div id="linksGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            </div>
    </div>

    <script>
        // 1. DATA: Add your file names and titles here
        const knowledgeData = [
            { title: "JooQ Explainer (compare with JPA and Mybatis)", path: "knowledge/jooq-explainer.html", tags: ["backend", "architecture", "jooq"] },
            // Add more entries as you create new HTML files
        ];

        const grid = document.getElementById('linksGrid');
        const searchBar = document.getElementById('searchBar');

        // Fuse.js options for searching
        const fuse = new Fuse(knowledgeData, { keys: ['title', 'tags'], threshold: 0.3 });

        function render(data) {
            grid.innerHTML = data.map(item => `
                <a href="${item.path}" class="block p-6 bg-white rounded-xl border border-slate-100 shadow-sm hover:shadow-md hover:border-blue-300 transition-all group">
                    <h3 class="text-lg font-semibold text-slate-700 group-hover:text-blue-600">${item.title}</h3>
                    <div class="mt-2 flex gap-2">
                        ${item.tags.map(tag => `<span class="text-xs bg-slate-100 text-slate-500 px-2 py-1 rounded">${tag}</span>`).join('')}
                    </div>
                </a>
            `).join('');
        }

        // Initial render
        render(knowledgeData);

        // Search logic
        searchBar.addEventListener('input', (e) => {
            const query = e.target.value;
            if (query.length === 0) {
                render(knowledgeData);
            } else {
                const results = fuse.search(query).map(r => r.item);
                render(results);
            }
        });
    </script>
</body>
</html>
